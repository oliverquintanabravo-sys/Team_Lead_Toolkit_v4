  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

 any of it matters.',\n  groups:[\n    {h:'The Center\\'s Expanded Learning mission', body:[\n      P('Our programs exist to provide innovative, youth-driven, high-quality out-of-school-time opportunities — building school-community partnerships, engaging families in their children\\'s learning, and learning through project-based enrichment that complements the school day.'),\n      P('After-school isn\\'t daycare. For a lot of students this is the part of the day where they feel seen, safe, and capable. That\\'s the job underneath the job.')\n    ]},\n    {h:'This year\\'s theme: Community', body:[\n      P('Everything in 25–26 ties back to one word — <b>Community<\u002Fb>. You\\'re not just running a room; you\\'re building a small community students want to belong to.'),\n      C('Keep this in front of you','We are not simply supervising students. We are helping create experiences, memories, confidence, and opportunities.')\n    ]},\n    {h:'The Center\\'s five values', body:[\n      P('Every choice you make in the classroom can trace back to one of these five:'),\n      L('<b>Excellence<\u002Fb> — it\\'s how we think and act: prompt responses, consistent communication, a superior experience every time','<b>Caring<\u002Fb> — students feel it before they hear it; we promote healthy choices, behaviors, and access','<b>Respect<\u002Fb> — empathy in action; we welcome unique ideas, beliefs, and cultures','<b>Community<\u002Fb> — we\\'re proud members of the Sacramento region, embracing its diversity and heritage','<b>Teamwork<\u002Fb> — we serve the underserved by supporting each other and making choices that benefit everyone')\n    ]},\n    {h:'Know your \"why\"', body:[\n      P('Hold onto your reason for being here — especially on the hard days. It\\'s what carries you when a plan flops or a week runs long.'),\n      Q('Find your why and you\\'ll find your way.','John C. Maxwell'),\n      Q('If the plan doesn\\'t work, change the plan, not the goal.')\n    ]},\n    {h:'What we\\'re building toward', body:[\n      P('The 25–26 goals everyone is rowing toward:'),\n      L('<b>For students<\u002Fb> — safe spaces, academic improvement, healthier habits, real engagement and impact','<b>For Team Leaders<\u002Fb> — a supportive environment, respectful feedback, professional growth','<b>For your site team<\u002Fb> — teamwork, shared purpose, strong daily attendance','<b>Agency-wide<\u002Fb> — team building, career growth, strong district partnerships, community engagement')\n    ]}\n  ]\n},\n{ key:'mindset', icon:'mindset', title:'Mindset',\n  tag:'Shifting from intern to Team Lead ownership.',\n  sub:'The biggest change isn\\'t the title. It\\'s how you think.',\n  groups:[\n    {h:'Intern brain vs. Team Lead brain', body:[\n      PAIR(\n        {h:'Intern',lead:false,items:['Waits for direction','Assists activities','Supports operations','Follows the plan']},\n        {h:'Team Lead',lead:true,items:['Creates the plan','Solves problems','Leads activities','Builds classroom culture','Takes full ownership']}\n      )\n    ]},\n    {h:'The shift', body:[\n      Q('The biggest promotion isn\\'t in your title. It\\'s in your mindset.'),\n      P('Sit with the question that defines the jump:'),\n      C('Ask yourself','What changes when you become responsible for an entire classroom?')\n    ]},\n    {h:'Set the bar high — and hold it', body:[\n      P('Students rise to the expectations you set. Decide early what a great day looks like and don\\'t quietly lower it when things get busy.'),\n      L('Name the mission for your room — out loud, with your students','Expect your best effort daily, and expect theirs','Treat a rough day as information, not a verdict'),\n      Q('If the plan doesn\\'t work, change the plan, not the goal.')\n    ]}\n  ]\n},\n{ key:'workplans', icon:'workplans', title:'Work Plans',\n  tag:'Build your week and meet the quality standards.',\n  sub:'A good plan is the difference between a smooth week and a stressful one.',\n  groups:[\n    {h:'Why work plans exist', body:[\n      L('<b>They run the day, week, month, and year<\u002Fb> — your roadmap, not busywork','<b>They\\'re tied to grants and the district<\u002Fb> — real funding depends on them','<b>They cover you when you\\'re out<\u002Fb> — a sub or co-lead can pick up your plan and run','<b>They lower stress<\u002Fb> — planning ahead means fewer surprises on the floor')\n    ]},\n    {h:'The weekly framework', body:[\n      P('Anchor each day to a theme so the week has a rhythm students can feel:'),\n      L('<b>Monday<\u002Fb> — STEM','<b>Tuesday<\u002Fb> — Arts &amp; Creativity','<b>Wednesday<\u002Fb> — Physical Activity','<b>Thursday<\u002Fb> — Career Exploration','<b>Friday<\u002Fb> — Community Building &amp; Reflection')\n    ]},\n    {h:'What every day must cover', body:[\n      P('On the Weekly Team Leader Work Plan, each day has the same three blocks plus a daily initiative:'),\n      L('<b>Academic Support &amp; Literacy<\u002Fb> — homework first, with an after-homework option ready (worksheet, approved website, school program on the laptop, or a book)','<b>Structured Physical Activity<\u002Fb> — your outdoor game, run on the BASICS framework, with materials listed','<b>Enrichment<\u002Fb> — the main activity, with a clear <b>Title, Description, and Objective<\u002Fb>, and the materials you\\'ll need'),\n      P('Each day also names the <b>Materials<\u002Fb> you\\'ll pull and checks the <b>Quality Standards<\u002Fb> it hits.')\n    ]},\n    {h:'A real week, fully planned — Mr. Oliver, Sierra View', body:[\n      P('This is a complete, real Week 1 work plan you can model yours on. Every day hits all seven quality standards, with the three required blocks and a materials list.'),\n      WDAY('Monday','STEM',['1','2','3','4','5','6','6a'],\n        ['Whole group homework review — TL goes over common homework problems on the board','1-on-1 help available — students who need extra support work directly with TL','Early finishers: i-Ready or Reflex Math on Chromebooks'],\n        ['Structured game: Duck Duck Goose — builds energy and community on Day 1','Cool-down: 5-minute stretching circle before coming inside'],\n        'Paper Cup Estimation Challenge',\n        'How many pieces of paper fit in the cup? Students guess across 3 rounds — just by looking, after pouring it out, then after grabbing a handful. Builds observation, estimation, and analysis. Key teaching moment: do students change their answer or stick with it? Both spark great conversation about data and intellectual honesty. Connects to STEM thinking: hypothesis, test, observe, revise.',\n        ['Paper cups (1 per student)','Scrap paper (torn pieces)','Pencils','Whiteboard / chart paper','Chromebooks (early finishers)','i-Ready / Reflex Math']),\n      WDAY('Tuesday','Arts &amp; Creativity',['1','2','3','4','5','6','6a'],\n        ['Whole group homework review — TL reviews ELA or reading homework on the board','1-on-1 help — TL circulates and supports students individually as needed','Early finishers: independent reading or creative writing journal'],\n        ['Structured game: Night at the Museum — TL walks with back to students; students strike a statue pose when TL turns around or they are out','Cool-down: deep breathing exercise before transitioning inside'],\n        'Kindness Cards',\n        'Students create 3 cards each: one for a family member at home, one for a classmate, one for a staff member. Students choose their own message and decorate freely. Builds community, empathy, and creative expression. TL shares examples first, then students work independently with music playing in the background.',\n        ['Cardstock / blank cards','Markers','Colored pencils','Crayons','Stickers / stamps (optional)','Envelopes (optional)','Calm background music']),\n      WDAY('Wednesday','Physical Activity',['1','2','3','4','5','6','6a'],\n        ['Whole group homework review — TL goes over math homework on the board','1-on-1 help — TL works with students individually while others begin Blooket','Early finishers: Blooket math review (time, money, or place value)'],\n        ['Mile Club — all students run laps around a set area, each lap recorded on a tracking sheet. Builds endurance, goal-setting, and healthy habits.','Post-run: 8-minute yoga / full-body stretching cool-down before coming inside'],\n        'Blooket Math Challenge',\n        'Educational game-based review focused on telling time, counting money (dollars, quarters, dimes, nickels, pennies), place value, or centuries and timelines. TL selects the topic based on what students are currently working on in school. Whole class plays together on Chromebooks. TL monitors the leaderboard and celebrates improvement, not just winners.',\n        ['Chromebooks (1 per student)','Blooket account (TL)','Lap tracking sheet','Pencils','Yoga mat or open floor space','Timer for Mile Club']),\n      WDAY('Thursday','Career Exploration',['1','2','3','4','5','6','6a'],\n        ['Whole group homework review — TL covers any subject on the board as a group','1-on-1 help — TL supports students who need additional help after group review','Early finishers: i-Ready or independent reading'],\n        ['Structured game: Would You Rather Showdown — students move to opposite sides of the room based on their answer and try to convince others to switch sides','Cool-down: stretching and deep breaths before heading inside'],\n        'Career Exploration Program',\n        'Each student writes their name on a card with their dream career on the back. TL draws one card per week; that student\\'s career becomes the weekly enrichment theme, tying in STEM, art, writing, and math. Continue drawing until every name has been called — every student gets their moment. Today: introduce the program, students fill out their career cards and share their dream job with a partner. TL introduces the first career drawn and previews next week.',\n        ['Index cards (1 per student)','Pencils','Markers','Career cards box / container','Chart paper for career list','i-Ready (early finishers)']),\n      WDAY('Friday','Fun Friday &amp; Community Building',['1','2','3','4','5','6','6a'],\n        ['Whole group homework review — quick Friday check-in, review any leftover work','1-on-1 help — TL checks in with any students who struggled during the week','Early finishers: Blooket free play or choice reading'],\n        ['Free Play Friday — students choose their own outdoor activity with light structure: designated zones, equipment available, TL circulates and joins in','Cool-down: Rose, Thorn &amp; Seed circle outside before coming inside'],\n        'Community Circle + Fun Friday Stations',\n        'Students begin with a full Rose, Thorn &amp; Seed circle (best of the week, something hard, something to look forward to). Then rotate through Fun Friday stations: Legos / magnetic tiles, board games, coloring / art free draw, and student choice. TL circulates and connects with every student. Ends with a group shoutout round — TL gives every student one specific acknowledgment from the week before dismissal.',\n        ['Legos / magnetic tiles','Board games / card games','Coloring sheets / blank paper','Markers / colored pencils','Chromebooks (optional free play)','Chart paper (Rose, Thorn &amp; Seed)'])\n    ]},\n    {h:'Quality standards (1–6 and 6a)', body:[\n      P('Your plans are scored against California\\'s Point-of-Service quality standards. Don\\'t treat them as a box you tick at the end — plan with them in mind:'),\n      L('<b>1<\u002Fb> — Safe and Supportive Environment','<b>2<\u002Fb> — Active and Engaged Learning','<b>3<\u002Fb> — Skill Building','<b>4<\u002Fb> — Youth Voice and Leadership','<b>5<\u002Fb> — Healthy Choices and Behaviors','<b>6<\u002Fb> — Diversity, Access and Equity','<b>6a<\u002Fb> — Supporting English Learners'),\n      P('<b>August–November focus:<\u002Fb> standards 1 and 2 — get the environment safe and supportive, and the learning active and engaging, before anything else.')\n    ]},\n    {h:'How to actually build and submit them', body:[\n      L('You\\'ll get time to work on them daily, weekly, or monthly','Typed or handwritten — both are fine','<b>Every day must be completed<\u002Fb> — no blanks','By the due date, <b>upload to the Drive or email your Program Manager<\u002Fb>'),\n      C('The goal','Draft Week 1 fully before it starts — even a rough plan beats walking in cold.')\n    ]},\n    {h:'Plan it like a pro: facilitation &amp; reflection', body:[\n      L('<b>Use the template as a base<\u002Fb>, then make it yours with authentic facilitation','<b>Build in a Plan B<\u002Fb> and keep it inclusive — activities should work for every student in the room','<b>Reflect afterward<\u002Fb> — what landed, what didn\\'t; reflection is what powers student-interest enrichment and real buy-in')\n    ]},\n    {h:'The blank template', body:[\n      P('Here\\'s the empty structure every day follows. Copy it five times — one per day — and fill in your own week.'),\n      WTPL()\n    ]},\n    {h:'Download the work plan &amp; template', body:[\n      P('Grab the files to print or fill in on your own device.'),\n      DLINK('Filled example — Mr. Oliver (PDF)','The complete Monday–Friday week shown above','WorkPlan_MrOliver_FILLED.pdf',DL_FILLED),\n      DLINK('Blank work plan template (Word)','The empty form to fill in for your own week','Work_Plan_Template.docx',DL_BLANK),\n      NOTE('Files download straight to your device — no sign-in needed. Submit your finished plan by uploading to the Drive or emailing your Program Manager.')\n    ]}\n  ]\n},\n{ key:'enrichment', icon:'enrichment', title:'Enrichment',\n  tag:'A library of activities students remember.',\n  sub:'Real activities, pulled from real weeks — ready to run.',\n  groups:[\n    {h:'Signature activities', body:[\n      P('<b>Paper Cup Estimation Challenge.<\u002Fb> How many pieces of paper fit in the cup? Students guess across three rounds — just looking, then after pouring it out, then after grabbing a handful. Builds observation, analysis, and estimation. The real lesson: do they change their answer or stick with it? Both are great teaching moments about intellectual honesty.'),\n      P('<b>Career Exploration Program.<\u002Fb> Every student writes their name on a card with their dream career on the back. Draw one card a week — that student\\'s career becomes the enrichment theme, tying in STEM, art, writing, and math. Continue until every name is drawn. Every kid gets their moment. Every kid feels seen.')\n    ]},\n    {h:'Build culture and student voice', body:[\n      L('<b>Community Circles<\u002Fb> — trust, student voice, conflict resolution, and culture from Day 1','<b>Student Expert Day<\u002Fb> — students teach something they love; builds confidence and leadership','<b>Problem of the Week<\u002Fb> — team challenges, collaboration, and critical thinking')\n    ]},\n    {h:'Ready-to-run from real weeks', body:[\n      L('<b>Kindness Cards<\u002Fb> — one for home, one for a classmate, one for a staff member; builds empathy and community','<b>Blooket Review<\u002Fb> — math or science review that plays like a game; the whole class reviews time, money, or place value','<b>Student Expert Day<\u002Fb> — students teach the class something they love; builds confidence and student voice','<b>LEGO Town<\u002Fb> — the whole class builds a town together over a month on a designated day; collaboration and pride of ownership')\n    ]},\n    {h:'Where activities come from', body:[\n      L('<b>Agency initiatives<\u002Fb> — programs the Center rolls out across sites','<b>District vendors<\u002Fb> — partner-led enrichment your site may host','<b>Your own ideas<\u002Fb> — the best ones are built around what your students are into'),\n      P('Have your materials staged in your cart or classroom before students arrive — construction paper, coloring utensils, glue, and whatever the activity calls for.')\n    ]},\n    {h:'Clubs, showcases &amp; the program initiative plan', body:[\n      L('<b>Clubs<\u002Fb> — you lead it, and it\\'s genuinely up to you what it is; your site decides when it runs','<b>Showcases<\u002Fb> — district events and agency events where students show what they\\'ve made','<b>Program Initiative Plan<\u002Fb> — frame the year around a Safe &amp; Supportive Environment, Active &amp; Engaged Learning, and Youth Voice &amp; Leadership')\n    ]},\n    {h:'The principle behind all of it', body:[\n      C('Why it works','Students are more engaged when they help shape their own learning experiences.')\n    ]}\n  ]\n},\n{ key:'play', icon:'play', title:'Structured Play',\n  tag:'Outdoor games and the playbook that runs them.',\n  sub:'Your go-to games, plus the rotation that keeps outside time from turning into chaos.',\n  groups:[\n    {h:'Go-to outdoor games', body:[\n      L('<b>Builders &amp; Bulldozers<\u002Fb>','<b>Mr. Wolf<\u002Fb>','<b>Chain Tag<\u002Fb>','<b>Cops &amp; Robbers<\u002Fb>','<b>Inclusion Tag<\u002Fb> — tagged players are freed when teammates link up or give two high-fives')\n    ]},\n    {h:'Fitness and team games', body:[\n      P('<b>Mile Club.<\u002Fb> All grades run laps around a set area; each lap gets recorded on a tracking sheet. Builds endurance, goal-setting, and healthy habits — and ties straight into the agency goal of healthier students.'),\n      P('<b>Soccer Club.<\u002Fb> Dribbling relays, passing-accuracy games, and small-sided matches. Teamwork and fundamentals for 4th–6th graders.')\n    ]},\n    {h:'Run it on the BASICS framework', body:[\n      P('Structured play isn\\'t free-for-all. Use the BASICS approach to keep games tight and fair:'),\n      L('Stage your materials first — soccer balls, jump ropes, cones, hula hoops, ready to go','Set clear boundaries and explain the rules before anyone moves','Keep <b>line of sight<\u002Fb> on every student the entire time — this is non-negotiable outside')\n    ]},\n    {h:'A rotation that works', body:[\n      P('From a real week — give each day a default game so transitions outside are automatic:'),\n      L('<b>Mon<\u002Fb> — Builders &amp; Bulldozers','<b>Tue<\u002Fb> — Mr. Wolf','<b>Wed<\u002Fb> — Mile Club','<b>Thu<\u002Fb> — Chain Tag','<b>Fri<\u002Fb> — Free structured play')\n    ]},\n    {h:'Structured first, choice second', body:[\n      P('Free play isn\\'t the enemy — but lead with structure. Structured play teaches participation, safety, and cooperation, and it\\'s where class bonding actually happens. When students show they can participate safely and respectfully, free-choice time becomes a meaningful incentive within a balanced routine.'),\n      C('The mindset','Structured first, choice second — free play is the reward that comes after the class shows it can move as a group.')\n    ]},\n    {h:'A sample outdoor routine', body:[\n      L('<b>5 min<\u002Fb> — expectations &amp; set-up','<b>15–20 min<\u002Fb> — structured game','<b>10 min<\u002Fb> — supervised free choice','<b>5 min<\u002Fb> — clean-up, line-up, transition'),\n      P('Exact timing depends on your site — but the order rarely changes.')\n    ]},\n    {h:'The one rule', body:[\n      C('Keep it light, not loose','Even free time should have light structure — that\\'s what makes moving in and out of activities smooth instead of chaotic.')\n    ]}\n  ]\n},\n{ key:'comm', icon:'comm', title:'Communication',\n  tag:'What to say, and when to say it — every time.',\n  sub:'When in doubt, communicate. Over-communication beats under-communication, every time.',\n  groups:[\n    {h:'The golden rule', body:[\n      C('The golden rule','Your program manager should never be surprised.'),\n      P('If something happened that a parent, a coordinator, or your PM might hear about later — they should hear about it from you first.')\n    ]},\n    {h:'Stay reachable during program', body:[\n      L('Actively check your email, texts/calls, and Paychex messages — especially during work hours','<b>General questions:<\u002Fb> trusd.admin@sccsc.org or nusd.admin@sccsc.org','<b>Hiring &amp; resignation:<\u002Fb> careers@sccsc.org')\n    ]},\n    {h:'Always communicate immediately', body:[\n      L('Student injury','Parent concern','Behavior issue','Student disclosure','Classroom conflict','Any day you might be absent or late')\n    ]},\n    {h:'Absences, tardiness &amp; time off — the rules', body:[\n      L('<b>Unplanned absence:<\u002Fb> notify your PM at least 24 hours ahead or ASAP, by call/text/email, and say why','<b>3rd consecutive sick day:<\u002Fb> you\\'ll need a doctor\\'s note clearing you to return safely','<b>Running late:<\u002Fb> tell your PM at least 3 hours ahead or ASAP, with your reason and an ETA','<b>Planned time off:<\u002Fb> submit a Time Off Request form — minimum two weeks before the first day out; you\\'ll get written approval or a written reason if denied')\n    ]},\n    {h:'Copy-and-paste scripts', body:[\n      P('Starting points you can adapt. Tap copy, then make it yours.'),\n      SCRIPT('Calling in sick','Good morning [Manager] — I woke up not feeling well and I won\\'t be able to make it in today. I wanted to let you know as early as possible so the site has time to cover my class. I\\'ll keep you updated and let you know how I\\'m doing for tomorrow.'),\n      SCRIPT('Running late','Hi [Manager] — I\\'m running behind this afternoon. I\\'m on my way and expect to be at site by [time]. Wanted to give you a heads up as early as I could so we can cover the start of program. See you shortly.'),\n      SCRIPT('Reporting an incident to your PM','Quick heads up: during [activity], [student] [what happened]. Everyone is okay and there\\'s no emergency. Here\\'s what I did and what I\\'m keeping an eye on. Wanted you in the loop in case a parent reaches out.'),\n      SCRIPT('Talking to a parent at pickup','Thanks for letting me know — I want to make sure I get this right. Can I take down the details and loop in our program manager so we follow up the right way? I\\'ll make sure you hear back.'),\n      SCRIPT('Following up after a behavior issue','I wanted to connect about [student]\\'s afternoon. Here\\'s what happened and how we worked through it together. They finished the day on a good note — I just wanted you to hear it from me first.')\n    ]}\n  ]\n},\n{ key:'transitions', icon:'transitions', title:'Transitions',\n  tag:'Reset the room and keep the day flowing.',\n  sub:'The small moves between activities are where a class is won or lost.',\n  groups:[\n    {h:'Reset the room', body:[\n      L('<b>Breathing exercises<\u002Fb> — pull up a YouTube breathing video to calm and refocus between activities','<b>Calm music<\u002Fb> during homework time signals focus without you saying a word','<b>Whole-group restroom breaks<\u002Fb> — move as one line so no one\\'s unaccounted for')\n    ]},\n    {h:'Attention grabbers', body:[\n      P('Keep a mix of verbal and non-verbal call-and-response ready for any moment:'),\n      L('\"Class, class?\" → \"Yes, yes!\"','A clap pattern they echo back','\"If you can hear me, touch your nose.\"','A silent raised hand the room mirrors back')\n    ]},\n    {h:'Smooth handoffs', body:[\n      P('Use a little structure so moving in and out of activities isn\\'t a scramble — name what\\'s next, give a time cue, and move the group together.'),\n      Q('Once we have structure, we can focus on creating meaningful experiences.')\n    ]}\n  ]\n},\n{ key:'behavior', icon:'behavior', title:'Behavior Management',\n  tag:'Build culture, not just correct behavior.',\n  sub:'Behavior is communication. Your job is to read it, not just stop it.',\n  groups:[\n    {h:'Why students misbehave', body:[\n      L('Attention seeking','Frustration or boredom','Lack of connection or structure','Emotional needs'),\n      C('The better question','Instead of \"how do I stop this?\" ask: what need is this behavior communicating?')\n    ]},\n    {h:'Same House, Same Rule', body:[\n      P('Your program expectations should line up with the school\\'s. When students walk from the school day into your program, the rules shouldn\\'t change on them.'),\n      L('Align with your site\\'s system — many use <b>PBIS<\u002Fb> or <b>CHAMPS<\u002Fb> (it varies by site)','<b>Positive reinforcement only<\u002Fb> — no yelling, threats, or negativity','Keep expectations consistent so students always know where the line is')\n    ]},\n    {h:'Set classroom agreements in week one', body:[\n      L('Build <b>3–5 agreements<\u002Fb> together, with real student buy-in','Align them with the classroom teacher\\'s agreements where you can','Use grade-level language students actually understand','Keep a few tools ready for redirection, intervention, and reinforcement')\n    ]},\n    {h:'Positive reinforcement: economy systems', body:[\n      L('A fake-money or point system rewards good behavior','Students are working toward something — that gives them motivation','Discipline starts to feel positive and goal-oriented, not punitive')\n    ]},\n    {h:'First-time struggles', body:[\n      P('It\\'s normal. Every successful Team Lead has been there. The skill isn\\'t never struggling — it\\'s knowing when and how to ask your Site Coordinator for support.'),\n      C('The mindset','Focus on building relationships, not just correcting behavior.')\n    ]}\n  ]\n},\n{ key:'operations', icon:'operations', title:'Operations',\n  tag:'Paychex, prep, attendance, and professional standards.',\n  sub:'The unglamorous stuff that makes you someone the team can rely on.',\n  groups:[\n    {h:'Professionalism', body:[\n      L('<b>Reliability<\u002Fb> — show up, every time','<b>Punctuality<\u002Fb> — be early, not on time','<b>Accountability<\u002Fb> — own your mistakes and your wins','<b>Attitude<\u002Fb> — your energy sets the tone for the whole class','<b>Customer service to ALL stakeholders<\u002Fb> — students, families, school staff, teammates'),\n      P('<b>Dress code:<\u002Fb> casual wear that follows the school\\'s dress code, and be mindful of scent. Show up outside the guidelines and you\\'ll be asked to change.')\n    ]},\n    {h:'Your prep routine (the 5 + 40)', body:[\n      P('Most days include <b>45 minutes of prep<\u002Fb> — a 5-minute planning check-in, then 40 minutes to set up.'),\n      L('<b>Check in (5 min):<\u002Fb> clock in on Paychex, grab a walkie-talkie (know your station number, charge/pickup spot, codes, and protocols), grab your lanyard, and read the daily announcements','<b>Set up (40 min):<\u002Fb> stage your carts — academic support (pencils, erasers, rulers, scissors, paper, coloring utensils), enrichment (construction paper, glue, etc.), and physical activity (soccer balls, jump ropes, cones, hula hoops)'),\n      P('Your <b>lanyard/ID must be visible at all times<\u002Fb> and stays on site unless you\\'re supporting the before-school program at another site.')\n    ]},\n    {h:'Paychex: clocking in and out', body:[\n      P('Clock in and out in <b>real time<\u002Fb>, on the schedule that was confirmed for you — and never have anyone clock in or out for you. Keep your location services on.'),\n      IMG('Paychex Flex dashboard — your home base: live clock, today\\'s total, time off, check stubs, and tax docs. (Fall Launch deck, \"Paychex Flex: Dashboard.\")','data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAOsBRQDASIAAhEBAxEB/8QAHAABAAEFAQEAAAAAAAAAAAAAAAECAwQGBwUI/8QAXBAAAQMDAQMHBQkMCAMGBQQDAAECAwQFEQYSITEHExRBUVOSMlJhcZEiMzRUcoGhscEIFRY1QmRzdJSy0eEXGCM3VmWToiRi0iUmNkOC8CdEVWPxKDhFdYPChf/EABsBAQADAQEBAQAAAAAAAAAAAAABAgMFBAYH/8QAPREBAAEDAgQDBQYFBAICAwEAAAECAxEEEhMhMVEFMkEUUmFxgRUWIjRCwQahsdHwM5Hh8SMkNXJTgpKy/9oADAMBAAIRAxEAPwD7DG/sJQkiKImE1XJicKQTkZ9A2QrxKuyATkjI2R3TxKuwBkDZHc4lXYAyMjZH y window', body:[\n      L('You\\'re a <b>part-time casual employee<\u002Fb> (Team Leader or Senior Team Leader)','Employment runs through the academic year; you return via an <b>Intent to Return<\u002Fb> in good standing','<b>First 90 days are probationary<\u002Fb> (at-will) — the things that put it at risk are insubordination, student-safety lapses, and attendance','<b>No call / no show<\u002Fb> becomes job abandonment after the 3rd consecutive day'),\n      NOTE('Your full Employee Handbook lives in your Paychex account — conduct, dress code, cell phone use, drug/tobacco-free workplace, leave of absence, and more.')\n    ]}\n  ]\n},\n{ key:'safety', icon:'safety', title:'Safety',\n  tag:'Supervision, boundaries, emergencies, and reporting.',\n  sub:'Everything that keeps students safe — and keeps you protected too.',\n  groups:[\n    {h:'Line of sight is everything', body:[\n      P('Constant, active supervision is the core of the job. You should always be able to <b>watch, count, and listen<\u002Fb> to your students.'),\n      L('Keep clear sightlines and easy access to every child','Anticipate what students might do and redirect before it escalates','Move students in <b>whole-group restroom breaks<\u002Fb>, not one-offs','Keep verbal and non-verbal attention-getters ready')\n    ]},\n    {h:'Student boundaries', body:[\n      P('Warmth and boundaries go together. Students are stakeholders — talk to them with respect — and protect the line at the same time.'),\n      L('Be mindful of physical touch — hugging, touching, etc.','Don\\'t speak about students to people who don\\'t need the information','<b>Don\\'t add students on social media<\u002Fb> or share your personal phone or email','Don\\'t share items, food, or personal belongings with students; they shouldn\\'t be in your bag','Remember cameras are on campus — assume your interactions are visible')\n    ]},\n    {h:'Confidentiality &amp; daily safety basics', body:[\n      L('<b>Student insight is confidential<\u002Fb> — rosters, allergies, medication, walker status, photo-release info stay protected','Know your class and supper rosters, and each student\\'s allergies/medication needs','<b>No student access<\u002Fb> to staff iPads or ProCare','Keep your program schedule and daily checklist on hand')\n    ]},\n    {h:'Visitors &amp; authorized pickup', body:[\n      L('<b>No one<\u002Fb> is on campus without a visitor badge or district badge — radio your Program Manager about anyone who isn\\'t, and if you\\'re comfortable, ask them to leave','<b>Only people listed in ProCare or 6Crickets can pick up a child<\u002Fb> — your PM will notify you of any updates')\n    ]},\n    {h:'Emergency procedures', body:[\n      L('<b>Drills<\u002Fb> — fire, earthquake, and intruder, about three times a year','<b>Know your emergency school map<\u002Fb> — exit routes, the safety-zone location, and your red/green cards','Know where the <b>first aid supplies<\u002Fb> are','Share your emergency contact info with your Program Manager')\n    ]},\n    {h:'You are a mandated reporter', body:[\n      P('Your role requires direct contact and supervision of children, which makes you a mandated reporter. If you have knowledge or <b>reasonable suspicion<\u002Fb> of abuse or neglect, you report it — you do <b>not<\u002Fb> have to prove anything.'),\n      L('<b>Step 1 — call it in:<\u002Fb> (916) 875-KIDS','<b>Step 2 — write it up:<\u002Fb> file the written report (Justice Form SS 8572) within 24 hours of the phone call; you\\'ll be given a code to file'),\n      C('Two things to remember','Keep it confidential, and make sure you\\'re clocked in when you handle a report.')\n    ]},\n    {h:'Incident reports &amp; facilities', body:[\n      L('<b>Document incidents<\u002Fb> and loop in your Program Manager — write down what happened while it\\'s fresh','Use <b>program supplies only<\u002Fb>; report missing or damaged teacher items right away','Run your clean-up routine after supper, after physical activity, and after classroom use'),\n      C('The standard','Leave the classroom and every space better than you found it.')\n    ]}\n  ]\n},\n{ key:'downloads', icon:'downloads', title:'Downloads',\n  tag:'Every file in one place.',\n  sub:'Every document and key number, without digging through a section.',\n  groups:[\n    {h:'Work plan files', body:[\n      P('The same files from Work Plans, gathered here for quick access.'),\n      DLINK('Filled example — Mr. Oliver (PDF)','The complete Monday–Friday week','WorkPlan_MrOliver_FILLED.pdf',DL_FILLED),\n      DLINK('Blank work plan template (Word)','The empty form to fill in for your own week','Work_Plan_Template.docx',DL_BLANK),\n      NOTE('More files will be added here as the program shares them.')\n    ]},\n    {h:'Sierra View phone numbers', body:[\n      P('Tap any number to call.'),\n      CONTACT('Sierra View — main line','Front office','','(916) 566-1960'),\n      CONTACT('Stephanie Tarrell','Principal','','(916) 566-1960 x24100'),\n      CONTACT('Arelli Abalos','Office Manager','','(916) 566-1960 x24142'),\n      CONTACT('Myesha Leassears','Counselor','','(916) 566-1960 x24144'),\n      CONTACT('Morgan Murphy','Nurse','','(916) 566-1960 x24145'),\n      LINK('Sierra View staff directory','Full staff list — official TRUSD site','https://sierra.trusd.net/')\n    ]}\n  ]\n},\n{ key:'toolbox', icon:'toolbox', title:'Toolbox',\n  tag:'One-tap links and numbers you use daily.',\n  sub:'Your shortcuts in one place.',\n  groups:[\n    {h:'Daily links', body:[\n      LINK('Paychex Flex login','Clock in / out, timecards, time-off — see Operations for step-by-step','https://myapps.paychex.com'),\n      LINK('Work plan template','Start your week here — duplicate and fill it in','#'),\n      LINK('Blooket','Math / science review games','https://www.blooket.com'),\n      LINK('i-Ready','Early-finisher practice','https://login.i-ready.com'),\n      LINK('Reflex Math','Fact fluency','https://www.reflexmath.com'),\n      LINK('Quality standards reference','The 1–6 / 6a Point-of-Service checklist','https://www.afterschoolnetwork.org/post/quality-standards-expanded-learning-california'),\n      NOTE('Links open in a new tab. The work plan template still needs your real Drive link — replace the <code>#<\u002Fcode> when you have it.')\n    ]},\n    {h:'Report &amp; emergency', body:[\n      LINK('Child Abuse Hotline','Mandated-reporter Step 1 — (916) 875-KIDS','tel:9168755437'),\n      LINK('Justice Form SS 8572','Mandated-reporter Step 2 — written report within 24 hrs','https://oag.ca.gov/sites/all/files/agweb/pdfs/childabuse/ss_8572.pdf'),\n      NOTE('You don\\'t need to prove anything to report — reasonable suspicion is enough. Keep it confidential and stay clocked in.')\n    ]}\n  ]\n},\n{ key:'contact', icon:'contact', title:'Contact',\n  tag:'Who to reach and how — one tap to call or email.',\n  sub:'When you need a hand, here\\'s exactly who to reach.',\n  groups:[\n    {h:'Program leadership', body:[\n      CONTACT('TRUSD Administration','General inquiries · Twin Rivers USD sites','trusd.admin@sccsc.org','916-908-9571'),\n      CONTACT('NUSD Administration','General inquiries · Natomas USD sites','nusd.admin@sccsc.org','916-490-0884'),\n      CONTACT('Careers &amp; HR','Hiring, onboarding, and resignation','careers@sccsc.org','916-442-4228')\n    ]},\n    {h:'Sierra View — your school site', body:[\n      LINK('Sierra View staff directory','Full staff list, bell schedule &amp; more — official TRUSD site','https://sierra.trusd.net/'),\n      CONTACT('Stephanie Tarrell','Principal','','(916) 566-1960 x24100'),\n      CONTACT('Arelli Abalos','Office Manager','','(916) 566-1960 x24142'),\n      CONTACT('Myesha Leassears','Counselor','','(916) 566-1960 x24144'),\n      CONTACT('Morgan Murphy','Nurse','','(916) 566-1960 x24145'),\n      NOTE('These are the site staff a new Team Lead reaches most. For everyone else, use the <a href=\"https://sierra.trusd.net/\" target=\"_blank\" rel=\"noopener\">official Sierra View directory<\u002Fa>.')\n    ]},\n    {h:'the Center — main office', body:[\n      CONTACT('Sacramento Chinese Community Service Center','1760 Creekside Oaks Dr. #200, Sacramento','info@sccsc.org','916-442-4228'),\n      NOTE('Resignation must go to your district admin email above <b>and<\u002Fb> careers@sccsc.org. A no-call / no-show for 3 consecutive days is treated as job abandonment.')\n    ]},\n    {h:'Emergencies', body:[\n      CONTACT('Child Abuse Hotline','Mandated-reporter Step 1','','916-875-5437'),\n      NOTE('For any immediate danger to a child or staff member, call <b>911<\u002Fb> first, then notify your Program Manager.')\n    ]}\n  ]\n}\n];\n\n/* ---------- render grid ---------- */\nconst grid = document.getElementById('cardGrid');\nSECTIONS.forEach((s,i)=>{\n  const n = String(i+1).padStart(2,'0');\n  const card = document.createElement('button');\n  card.className='card reveal';\n  card.onclick=()=>showSection(s.key, card);\n  card.innerHTML =\n    '<div class=\"card-top\"><span class=\"card-num\">'+n+'<\u002Fspan><span class=\"card-ic\">'+ic(s.icon)+'<\u002Fspan><\u002Fdiv>'+\n    '<h3>'+s.title+'<\u002Fh3><p>'+s.tag+'<\u002Fp>'+\n    '<span class=\"open\">Open <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M12 5l7 7-7 7\"/><\u002Fsvg><\u002Fspan>';\n  grid.appendChild(card);\n});\n\n/* ---------- render a section body ---------- */\nfunction buildBlock(b){\n  if(b.t==='p') return '<p>'+b.html+'<\u002Fp>';\n  if(b.t==='list') return '<ul>'+b.items.map(x=>'<li>'+x+'<\u002Fli>').join('')+'<\u002Ful>';\n  if(b.t==='quote') return '<blockquote class=\"quote\">'+b.text+(b.by?'<cite>— '+b.by+'<\u002Fcite>':'')+'<\u002Fblockquote>';\n  if(b.t==='callout') return '<div class=\"callout\"><b>'+b.label+'<\u002Fb><p>'+b.text+'<\u002Fp><\u002Fdiv>';\n  if(b.t==='note') return '<div class=\"note\">'+b.html+'<\u002Fdiv>';\n  if(b.t==='pair'){\n    const col=c=>'<div class=\"pair-col'+(c.lead?' lead':'')+'\"><h4>'+c.h+'<\u002Fh4><ul>'+c.items.map(x=>'<li>'+x+'<\u002Fli>').join('')+'<\u002Ful><\u002Fdiv>';\n    return '<div class=\"pair\">'+col(b.a)+col(b.b)+'<\u002Fdiv>';\n  }\n  if(b.t==='script'){\n    return '<div class=\"script\"><div class=\"script-top\"><b>'+b.label+'<\u002Fb>'+\n      '<button class=\"copy-btn\" onclick=\"copyScript(this)\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"11\" height=\"11\" rx=\"2\"/><path d=\"M5 15V5a2 2 0 0 1 2-2h8\"/><\u002Fsvg>Copy<\u002Fbutton><\u002Fdiv>'+\n      '<div class=\"script-text\">'+b.text+'<\u002Fdiv><\u002Fdiv>';\n  }\n  if(b.t==='link'){\n    return '<a class=\"tlink\" href=\"'+b.url+'\" target=\"_blank\" rel=\"noopener\"><span class=\"tl-main\"><b>'+b.label+'<\u002Fb><span>'+b.note+'<\u002Fspan><\u002Fspan>'+\n      '<span class=\"tl-go\">Open<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 17 17 7M9 7h8v8\"/><\u002Fsvg><\u002Fspan><\u002Fa>';\n  }\n  if(b.t==='img'){\n    return '<figure class=\"shot\"><div class=\"shot-frame\"><img src=\"'+b.src+'\" alt=\"'+b.caption+'\" loading=\"lazy\"><span class=\"shot-tag\">Screenshot<\u002Fspan><\u002Fdiv><figcaption>'+b.caption+'<\u002Ffigcaption><\u002Ffigure>';\n  }\n  if(b.t==='wday'){\n    const chips = ['1','2','3','4','5','6','6a'].map(n=>'<span class=\"qs'+(b.qs.includes(n)?' on':'')+'\">'+n+'<\u002Fspan>').join('');\n    return '<div class=\"wday\"><div class=\"wday-top\"><div class=\"wday-day\"><b>'+b.day+'<\u002Fb><span>'+b.initiative+'<\u002Fspan><\u002Fdiv><div class=\"qs-row\" title=\"Quality Standards met\">'+chips+'<\u002Fdiv><\u002Fdiv>'+\n      '<div class=\"wblock\"><span class=\"wlabel\">Academic Support &amp; Literacy<\u002Fspan><ul>'+b.academic.map(x=>'<li>'+x+'<\u002Fli>').join('')+'<\u002Ful><\u002Fdiv>'+\n      '<div class=\"wblock\"><span class=\"wlabel\">Structured Physical Activity<\u002Fspan><ul>'+b.physical.map(x=>'<li>'+x+'<\u002Fli>').join('')+'<\u002Ful><\u002Fdiv>'+\n      '<div class=\"wblock\"><span class=\"wlabel\">Enrichment<\u002Fspan><p class=\"enr-title\">'+b.enrTitle+'<\u002Fp><p class=\"enr-desc\">'+b.enrDesc+'<\u002Fp><\u002Fdiv>'+\n      '<div class=\"wmats\"><span class=\"wlabel\">Materials<\u002Fspan><div class=\"mat-tags\">'+b.materials.map(m=>'<span class=\"mat\">'+m+'<\u002Fspan>').join('')+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }\n  if(b.t==='wtpl'){\n    const day='<div class=\"tpl-day\"><div class=\"tpl-dh\"><b>[Day]<\u002Fb><span>Initiative: ____________<\u002Fspan><span class=\"tpl-qs\">Quality Standards: ☐1 ☐2 ☐3 ☐4 ☐5 ☐6 ☐6a<\u002Fspan><\u002Fdiv>'+\n      '<div class=\"tpl-row\"><span class=\"wlabel\">Academic Support &amp; Literacy<\u002Fspan><span class=\"tpl-line\"><\u002Fspan><\u002Fdiv>'+\n      '<div class=\"tpl-row\"><span class=\"wlabel\">Structured Physical Activity<\u002Fspan><span class=\"tpl-line\"><\u002Fspan><\u002Fdiv>'+\n      '<div class=\"tpl-row\"><span class=\"wlabel\">Enrichment — Objective / Description<\u002Fspan><span class=\"tpl-line\"><\u002Fspan><\u002Fdiv>'+\n      '<div class=\"tpl-row\"><span class=\"wlabel\">Materials<\u002Fspan><span class=\"tpl-line\"><\u002Fspan><\u002Fdiv><\u002Fdiv>';\n    return '<div class=\"tpl\"><div class=\"tpl-head\"><b>Weekly Team Leader Work Plan<\u002Fb><span>School Site: __________ · Team Leader: __________ · Week of: __________<\u002Fspan><\u002Fdiv>'+day+'<p class=\"tpl-foot\">Copy this block for Monday through Friday. Every day must be completed — no blanks.<\u002Fp><\u002Fdiv>';\n  }\n  if(b.t==='dlink'){\n    return '<a class=\"tlink dl\" href=\"'+b.href+'\" download=\"'+b.filename+'\"><span class=\"tl-main\"><b>'+b.label+'<\u002Fb><span>'+b.note+'<\u002Fspan><\u002Fspan>'+\n      '<span class=\"tl-go\">Download<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4M5 21h14\"/><\u002Fsvg><\u002Fspan><\u002Fa>';\n  }\n  if(b.t==='contact'){\n    const actions =\n      (b.email?'<a class=\"cc-act\" href=\"mailto:'+b.email+'\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"/><path d=\"m3 7 9 6 9-6\"/><\u002Fsvg>Email<\u002Fa>':'')+\n      (b.phone?'<a class=\"cc-act\" href=\"tel:'+b.phone.replace(/[^\\dx]/gi,'').replace(/x/i,',')+'\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.1-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 1.9.7 2.8a2 2 0 0 1-.5 2.1L8.1 9.9a16 16 0 0 0 6 6l1.3-1.3a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z\"/><\u002Fsvg>Call<\u002Fa>':'');\n    const meta = (b.email?'<span class=\"cc-line\">'+b.email+'<\u002Fspan>':'')+(b.phone?'<span class=\"cc-line\">'+b.phone+'<\u002Fspan>':'');\n    return '<div class=\"ccard\"><div class=\"cc-text\"><b>'+b.name+'<\u002Fb><span class=\"cc-role\">'+b.role+'<\u002Fspan>'+meta+'<\u002Fdiv><div class=\"cc-acts\">'+actions+'<\u002Fdiv><\u002Fdiv>';\n  }\n  return '';\n}\n\nfunction buildSection(key){\n  const s = SECTIONS.find(x=>x.key===key);\n  const idx = SECTIONS.indexOf(s);\n  document.getElementById('secLabel').textContent = 'Section '+String(idx+1).padStart(2,'0');\n  document.getElementById('secTitle').textContent = s.title;\n  document.getElementById('secSub').textContent = s.sub;\n  const body = document.getElementById('secBody');\n  const isLinks = s.key==='toolbox' || s.key==='contact' || s.key==='downloads';\n  body.innerHTML = s.groups.map((g,gi)=>{\n    const inner = (isLinks ? '<div class=\"linklist\">'+g.body.map(buildBlock).join('')+'<\u002Fdiv>' : g.body.map(buildBlock).join(''));\n    return '<div class=\"acc'+(gi===0?' open':'')+'\">'+\n      '<button class=\"acc-head\" aria-expanded=\"'+(gi===0)+'\" onclick=\"toggleAcc(this)\"><h3>'+g.h+'<\u002Fh3><span class=\"acc-sign\">+<\u002Fspan><\u002Fbutton>'+\n      '<div class=\"acc-body\" '+(gi===0?'':'style=\"display:none\"')+'>'+inner+'<\u002Fdiv><\u002Fdiv>';\n  }).join('');\n}\n\nlet activeCardEl = null;\nlet homeScrollY = 0;\nconst REDUCE_MOTION = window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n\nfunction siblingCards(except){\n  return Array.from(document.querySelectorAll('#toolkit .card')).filter(c=>c!==except);\n}\n\nfunction showSection(key, cardEl){\n  activeCardEl = cardEl || null;\n  buildSection(key);\n  const home = document.getElementById('home');\n  const section = document.getElementById('section');\n\n  if(REDUCE_MOTION || !cardEl){\n    home.style.display='none';\n    section.style.display='block';\n    window.scrollTo({top:0,behavior:'auto'});\n    return;\n  }\n\n  homeScrollY = window.scrollY;\n  const r = cardEl.getBoundingClientRect();\n\n  // fade the other cards out; the clicked tile stays as the anchor\n  const grid = document.getElementById('toolkit');\n  grid.classList.add('cards-anim');\n  siblingCards(cardEl).forEach(c=>c.classList.add('card-fade'));\n\n  // overlay the section as a fixed layer and zoom it out of the tile\n  section.style.display='block';\n  section.classList.add('zooming');\n  section.scrollTop = 0;\n\n  const ox = r.left + r.width/2;\n  const oy = r.top + r.height/2;\n  const s0 = Math.max(0.08, r.width / window.innerWidth);\n  section.style.transformOrigin = ox+'px '+oy+'px';\n\n  const anim = section.animate(\n    [\n      { transform:'scale('+s0+')', opacity:0, borderRadius:'16px', filter:'blur(3px)' },\n      { transform:'scale(1)', opacity:1, borderRadius:'0px', filter:'blur(0)' }\n    ],\n    { duration:520, easing:'cubic-bezier(.22,1,.36,1)' }\n  );\n  let done=false;\n  const finishOpen=()=>{\n    if(done) return; done=true;\n    section.classList.remove('zooming');\n    section.style.transformOrigin='';\n    home.style.display='none';\n    grid.classList.remove('cards-anim');\n    siblingCards(cardEl).forEach(c=>c.classList.remove('card-fade'));\n    window.scrollTo({top:0,behavior:'auto'});\n  };\n  anim.onfinish = finishOpen;\n  setTimeout(finishOpen, 600);\n}\n\nfunction showHome(){\n  const home = document.getElementById('home');\n  const section = document.getElementById('section');\n\n  if(REDUCE_MOTION || !activeCardEl){\n    section.style.display='none';\n    home.style.display='block';\n    activeCardEl=null;\n    return;\n  }\n\n  const cardRef = activeCardEl;\n  const grid = document.getElementById('toolkit');\n\n  // bring the grid back where it was, with the other cards pre-hidden\n  home.style.display='block';\n  window.scrollTo({top:homeScrollY,behavior:'auto'});\n  siblingCards(cardRef).forEach(c=>c.classList.add('card-fade'));\n\n  // measure the destination tile, then implode the panel into it\n  const r = cardRef.getBoundingClientRect();\n  section.classList.add('zooming');\n  const ox = r.left + r.width/2;\n  const oy = r.top + r.height/2;\n  const s0 = Math.max(0.08, r.width / window.innerWidth);\n  section.style.transformOrigin = ox+'px '+oy+'px';\n\n  // fade the other cards back in as the panel collapses\n  requestAnimationFrame(()=>{\n    grid.classList.add('cards-anim');\n    siblingCards(cardRef).forEach(c=>c.classList.remove('card-fade'));\n  });\n\n  const anim = section.animate(\n    [\n      { transform:'scale(1)', opacity:1, borderRadius:'0px', filter:'blur(0)' },\n      { transform:'scale('+s0+')', opacity:0, borderRadius:'16px', filter:'blur(3px)' }\n    ],\n    { duration:470, easing:'cubic-bezier(.55,0,.78,.35)' }\n  );\n  let done=false;\n  const finishBack=()=>{\n    if(done) return; done=true;\n    section.style.display='none';\n    section.classList.remove('zooming');\n    section.style.transformOrigin='';\n    grid.classList.remove('cards-anim');\n    siblingCards(cardRef).forEach(c=>c.classList.remove('card-fade'));\n    activeCardEl=null;\n    if(cardRef){ cardRef.classList.add('pulse'); setTimeout(()=>cardRef.classList.remove('pulse'),420); }\n  };\n  anim.onfinish = finishBack;\n  setTimeout(finishBack, 540);\n}\nfunction scrollToId(id){\n  const el=document.getElementById(id);\n  if(el) setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),10);\n}\nfunction toggleAcc(btn){\n  const acc=btn.parentElement, body=btn.nextElementSibling, open=acc.classList.toggle('open');\n  btn.setAttribute('aria-expanded',open);\n  body.style.display=open?'block':'none';\n}\nfunction copyScript(btn){\n  const text=btn.closest('.script').querySelector('.script-text').textContent.trim();\n  navigator.clipboard.writeText(text).then(()=>{\n    btn.classList.add('done');\n    btn.innerHTML='<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6 9 17l-5-5\"/><\u002Fsvg>Copied';\n    setTimeout(()=>{btn.classList.remove('done');btn.innerHTML='<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"11\" height=\"11\" rx=\"2\"/><path d=\"M5 15V5a2 2 0 0 1 2-2h8\"/><\u002Fsvg>Copy';},1800);\n  });\n}\n\n/* ---------- scroll reveal ---------- */\nconst io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:.12});\ndocument.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n\n/* ---------- ⌘K jump search palette ---------- */\nlet paletteSel = 0;\nlet paletteItems = [];\n\nfunction renderPaletteList(filter){\n  const q = (filter||'').trim().toLowerCase();\n  paletteItems = SECTIONS.filter(s =>\n    !q || s.title.toLowerCase().includes(q) || s.tag.toLowerCase().includes(q) || s.sub.toLowerCase().includes(q)\n  );\n  paletteSel = 0;\n  const list = document.getElementById('paletteList');\n  if(!paletteItems.length){\n    list.innerHTML = '<div class=\"palette-empty\">No tools match “'+(filter||'')+'”<\u002Fdiv>';\n    return;\n  }\n  list.innerHTML = paletteItems.map((s,i)=>{\n    const n = String(SECTIONS.indexOf(s)+1).padStart(2,'0');\n    return '<button class=\"palette-item'+(i===0?' sel':'')+'\" data-idx=\"'+i+'\" onmouseenter=\"paletteSel='+i+';markSel()\" onclick=\"jumpTo(\\''+s.key+'\\')\">'+\n      '<span class=\"pi-ic\">'+ic(s.icon)+'<\u002Fspan>'+\n      '<span class=\"pi-text\"><b>'+n+' · '+s.title+'<\u002Fb><span>'+s.tag+'<\u002Fspan><\u002Fspan>'+\n    '<\u002Fbutton>';\n  }).join('');\n}\nfunction markSel(){\n  document.querySelectorAll('.palette-item').forEach((el,i)=>el.classList.toggle('sel', i===paletteSel));\n  const sel = document.querySelector('.palette-item.sel');\n  if(sel) sel.scrollIntoView({block:'nearest'});\n}\nfunction filterPalette(v){ renderPaletteList(v); }\nfunction paletteKeydown(e){\n  if(e.key==='ArrowDown'){ e.preventDefault(); paletteSel=Math.min(paletteSel+1,paletteItems.length-1); markSel(); }\n  else if(e.key==='ArrowUp'){ e.preventDefault(); paletteSel=Math.max(paletteSel-1,0); markSel(); }\n  else if(e.key==='Enter'){ e.preventDefault(); if(paletteItems[paletteSel]) jumpTo(paletteItems[paletteSel].key); }\n  else if(e.key==='Escape'){ closePalette(); }\n}\nfunction jumpTo(key){\n  closePalette();\n  const cards=document.querySelectorAll('#cardGrid .card');\n  const idx=SECTIONS.findIndex(s=>s.key===key);\n  showSection(key, cards[idx]||null);\n}\nfunction openPalette(){\n  document.getElementById('paletteScrim').classList.add('open');\n  document.getElementById('paletteInput').value='';\n  renderPaletteList('');\n  setTimeout(()=>document.getElementById('paletteInput').focus(),10);\n}\nfunction closePalette(){ document.getElementById('paletteScrim').classList.remove('open'); }\ndocument.addEventListener('keydown', (e)=>{\n  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){ e.preventDefault(); openPalette(); }\n});\n<\u002Fscript>\n<!-- the Center — Intern to Team Lead Toolkit -->\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
